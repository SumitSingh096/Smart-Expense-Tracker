<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filter & Search</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style2.css">
</head>

<body>

    <!-- navbar -->

    <div class="navbar ">
        <i class="fa-solid fa-xmark"></i>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="filter.html">filter & Search</a></li>
            <li><a href="expense.html">Expense Overview</a></li>
        </ul>
    </div>


    <!-- header -->

    <header>
        <h1>Smart Expense Tracker</h1>
        <i class="fa-solid fa-bars"></i>
    </header>


    <!-- Edit Transaction -->

    <div class="edit-transaction display-none">
        <div id="edit-transaction">
            <div class="front">
                <h1>Edit Transaction</h1>
                <i class="fa-solid fa-xmark cross-mark"></i>
            </div>

            <div class="search">
                <p class="align">Amount:</p>
                <div class="amount3">
                    <input type="number" class="filter" id="edit-amount" placeholder="Enter Amount">
                </div>
            </div>

            <div class="search">
                <p>Category:</p>
                <div class="category">
                    <select name="edit-category" id="edit-category">
                        <option value="Other">Other</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Bills">Bills</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Education">Education</option>
                        <option value="Travel">Travel</option>
                    </select>
                </div>
            </div>

            <div class="search">
                <p>Type:</p>
                <label class="radio-label">
                    <input type="radio" name="type" value="Income">
                    <span class="radio-custom"></span>
                    Income
                </label>

                <label class="radio-label">
                    <input type="radio" name="type" value="Expense">
                    <span class="radio-custom"></span>
                    Expense
                </label>
            </div>

            <div class="date">
                <p>Date:</p>
                <div class="amount4">
                <input type="date" id="edit-date" class="date">
                </div>
            </div>


            <div class="search">
                <p class="align">Description:</p>
                <div class="amount3">
                    <input type="text" placeholder="Enter description" class="description" id="edit-description">
                </div>
            </div>

            <div class="button">
                <button id="save-change">Save Change</button>
                <button id="cancel">Cancel</button>
            </div>
        </div>



    </div>


    <!-- footer -->

    <div class="Filter-box">
        <h1>Filter & Search</h1>
        <div class="arrange">
            <div class="filter-category">
                <h2>Filter by Category</h2>
                <div class="amount3">
                    <select name="filter-category" class="filter" id="filter-by-category">
                        <option value="">All</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Bills">Bills</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Education">Education</option>
                        <option value="Travel">Travel</option>
                    </select>
                </div>
            </div>
            <div class="filter-date">
                <h2>Filter by Date</h2>
                <div class="amount3">
                    <input type="date" name="filter-date" class="filter date2" id="filter-by-date">  
                </div>
            </div>
            <div class="filter-type">
                <h2>Filter by Type</h2>
                <div class="amount3">
                    <select name="filter-type" class="filter type" id="filter-by-type">
                        <option value="">All</option>
                        <option value="Income">Income</option>
                        <option value="Expense">Expense</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="search">
            <p id="amount-margin">Amount:</p>
            <div class="amount3 prefix-box">
                <span id="prefix">$</span>
                <input type="number" class="filter" placeholder="Search by description" id="filter-by-amount">
            </div>
        </div>
        <button id="apply-filter">Apply Filter</button>
    </div>

    <!-- filter Transaction -->

    <div class="filter-transactions Filter-box">
        <h1>Filter Transactions</h1>

        <table id="Transaction-table">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Type</th>
                    <th></th>
                </tr>
            </thead>

            <tbody id="Transaction-body">
                <!-- content here -->
            </tbody>
        </table>
    </div>
    <script src="script2.js"></script>
</body>

</html>
