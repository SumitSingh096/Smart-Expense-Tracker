<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Expense Tracker</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="Index-style.css">
</head>

<body>

  <!-- navbar -->

  <div class="navbar ">
    <i class="fa-solid fa-xmark"></i>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="Filter-Search.html">Filter & Search</a></li>
      <li><a href="Expense-Overview.html">Expense Overview</a></li>
    </ul>
  </div>

  <!-- header -->

  <header>
    <h1 id="header-text">Smart Expense Tracker</h1>
    <i class="fa-solid fa-bars"></i>
  </header>

  <!-- footer -->

  <footer>
    <div class="container">
      <div class="Total income">
        <p>Total Income</p>
        <p id="amount" style="color:green">+ $0,000</p>
      </div>
      <div class="Total Expense">
        <p>Total Expense</p>
        <p id="amount2" style="color:red">- $0,000</p>
      </div>
      <div class="Total Balance">
        <p>Current Balance</p>
        <p id="amount3">$0,000</p>
      </div>
    </div>

    <!-- Add Transtion -->

    <div class="container2">
      <h1>Add Transaction</h1>
      <div class="transaction-amount">
        <div class="amount3">
          <input id="Amount-name" type="text" placeholder="Amount">
        </div>
        <div class="prefix-box">
          <span id="prefix">$</span>
          <input type="number" id="main-amount">
        </div>
      </div>

      <!-- category-box -->

      <div class="category-box">
        <div class="category">
          <select name="category" id="category">
            <option value="Other">Other</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Bills">Bills</option>
            <option value="Shopping">Shopping</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Education">Education</option>
            <option value="Travel">Travel</option>
          </select>
          
        </div>
        <label class="radio-label">
          <input type="radio" name="category" value="Income">
          <span class="radio-custom"></span>
          Income
        </label>

        <label class="radio-label">
          <input type="radio" name="category" value="Expense">
          <span class="radio-custom"></span>
          Expense
        </label>
      </div>

      <div class="date-box">
        <input type="date" id="date">

        <input type="text" placeholder="Enter description" class="amount3" id="description">
      </div>

      <button id="add-transaction">Add Transaction</button>
    </div>

  </footer>
  <script src="Index-script.js"></script>
  <script src="Filter-script.js"></script>
</body>

</html>
