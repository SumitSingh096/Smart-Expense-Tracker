<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Expense Overview</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="Index-style.css">
  <link rel="stylesheet" href="Filter-style.css">
  <link rel="stylesheet" href="Expense-style.css">
</head>

<body>

  <!-- navbar -->

  <div class="navbar ">
    <i class="fa-solid fa-xmark"></i>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="Filter-Search.html">Filter & Search</a></li>
      <li><a href="Expense-Overview.html">Expense Overview</a></li>
    </ul>
  </div>

  <!-- header -->

  <header>
    <h1 id="header-text">Smart Expense Tracker</h1>
    <i class="fa-solid fa-bars"></i>
  </header>

  <!-- footer -->

  <h1>Expense Overview</h1>

  <div class="container3">

    <div class="bar-chart">
      <canvas id="myChart-2"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      const ctx = document.getElementById('myChart-2');

      const data2 = JSON.parse(localStorage.getItem("transaction")) || [];

      const categoryTotals = {};

      data2.forEach(item => {
        const category = item.category;
        const amount = Number(item.amount);

        if (categoryTotals[category]) {
          categoryTotals[category] += amount;
        } else {
          categoryTotals[category] = amount;
        }
      });

      const labels = Object.keys(categoryTotals);
      const values = Object.values(categoryTotals);

      new Chart(ctx, {
        type: 'pie',
        data: {
          labels: labels,
          datasets: [{
            label: 'Expenses by Category',
            data: values,
            backgroundColor: [
              "#ff6384",
              "#36a2eb",
              "#ffce56",
              "#4bc0c0",
              "#9966ff",
              "#ff9f40"
            ],
            borderWidth: 0,
          }]
        },
        options: {
  plugins: {
    legend: {
      labels: {
        color: "white" // top category names
      }
    },
    tooltip: {
      bodyColor: "white",
      titleColor: "white"
    }
  }
}
      });
    </script>

    <div class="bar-chart">
      <canvas id="myChart"></canvas>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
      const ctx1 = document.getElementById('myChart');

      const data = JSON.parse(localStorage.getItem("transaction")) || [];
      let income = 0;
      let expense = 0;

      data.forEach(item => {
        if (item.type === "Income") {
          income += item.amount;
        } else {
          expense += item.amount;
        }
      });

      new Chart(ctx1, {
        type: 'bar',
        data: {
          labels: ['Income', 'Expense',],
          datasets: [{
            label: ['Amount'],
            data: [income, expense],
            borderWidth: 2,
            backgroundColor: ["green", "red"],
            borderColor: ["green", "red"],
            categoryPercentage: 0.4,
            barPercentage: 0.9,
            // barThickness:90,
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,

          plugins: {
            legend: {
              labels: {
                color: "white" // legend text color (Amount)
              }
            }
          },

          scales: {
            x: {
              ticks: {
                color: "white" // Income / Expense text
              },
              grid: {
                color: "rgba(255,255,255,0.2)",// vertical grid lines
                drawBorder: false,
              }
            },
            y: {
              ticks: {
                color: "white" // numbers on left (1000, 2000...)
              },
              grid: {
                color: "rgba(255,255,255,0.2)",// horizontal grid lines
                drawBorder: false,
              }
            }
          }
        }
      });
    </script>
  </div>

  <script src="Expense-script.js"></script>
</body>

</html>
